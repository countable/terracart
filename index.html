<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#111" />
  <!-- iOS PWA: launch fullscreen with a dark status bar when added to home screen. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Terracart" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>map-game prototype</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #111; color: #ddd;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      /* Block iOS Safari's elastic rubber-band overscroll on fast swipes —
         touch-action: none alone doesn't suppress it. */
      overscroll-behavior: none;
      touch-action: none;
    }
    #frame {
      position: absolute; inset: 0;
      overflow: hidden;
    }
    /* Fixed 352×844 native size — 352 = VIEW_CELLS × CELL_PX so the 11×11
       map view fills the canvas with no side padding. We scale the whole game
       (canvas + overlays) with a CSS transform from JS so it fits any viewport
       while keeping a single coordinate system internally. */
    #game {
      width: 352px; height: 844px;
      background: #000;
      box-shadow: 0 0 24px #000a;
      position: absolute; top: 0; left: 0;
      transform-origin: top left;
    }
    #banner {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      background: #c33; color: #fff; padding: 4px 10px; border-radius: 6px;
      font-size: 12px; display: none; z-index: 10;
    }
    #hud {
      position: fixed; bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      left: 8px; right: 8px;
      font-size: 11px; color: #fff8; pointer-events: none; z-index: 5;
      font-family: ui-monospace, monospace;
    }
    /* Top-row HUD is position:fixed and lives outside #game (see the comment
       on #hud below) so it anchors to the visual viewport instead of #game's
       scaled box. env(safe-area-inset-top) clears the iPhone notch. */
    #money {
      position: fixed; top: calc(8px + env(safe-area-inset-top, 0px)); right: 10px;
      background: #000a; color: #ffd96b; padding: 4px 10px;
      border: 2px solid #c8a64a; border-radius: 8px;
      font: 700 16px ui-monospace, monospace;
      pointer-events: none; z-index: 7;
    }
    #energy {
      position: fixed; top: calc(8px + env(safe-area-inset-top, 0px)); right: 88px;
      background: #000a; color: #a7ffb0; padding: 4px 10px;
      border: 2px solid #4a8c4a; border-radius: 8px;
      font: 700 14px ui-monospace, monospace;
      pointer-events: none; z-index: 7;
    }
    #menu { position: fixed; top: calc(8px + env(safe-area-inset-top, 0px)); left: 8px; z-index: 8; }
    #menu summary {
      list-style: none; cursor: pointer; user-select: none;
      background: #000a; color: #ddd;
      border: 2px solid #444; border-radius: 8px;
      padding: 2px 8px; font: 700 16px ui-monospace, monospace;
      line-height: 1.4;
    }
    #menu summary::-webkit-details-marker { display: none; }
    #menu[open] summary { border-color: #888; }
    #menu .items {
      margin-top: 4px; min-width: 140px;
      background: #000c; border: 2px solid #444; border-radius: 8px;
      padding: 4px; display: flex; flex-direction: column; gap: 2px;
    }
    #menu .items button {
      background: transparent; color: #ddd; border: 0;
      text-align: left; padding: 6px 8px; border-radius: 4px;
      font: 12px ui-monospace, monospace; cursor: pointer;
    }
    #menu .items button:hover { background: #fff2; }
    #menu .items button.danger { color: #ff8a7a; }
    /* Safety / sensor-permission splash shown on every load. The button
       click is the genuine user gesture we need to satisfy iOS's
       DeviceOrientationEvent.requestPermission() AND start GPS. */
    #safety {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0, 0, 0, 0.78);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #safety .box {
      max-width: 320px; background: #1a1612; color: #fff;
      border: 2px solid #c8a64a; border-radius: 12px;
      padding: 22px 20px; text-align: center;
      font: 14px ui-monospace, monospace; line-height: 1.45;
    }
    #safety p { margin: 0 0 18px; }
    #safety button {
      background: #c8a64a; color: #1a1612; border: 0;
      padding: 12px 22px; border-radius: 8px;
      font: 700 15px ui-monospace, monospace; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="frame">
    <div id="game">
      <div id="banner">reconnecting…</div>
    </div>
  </div>
  <!-- All HUD overlays live OUTSIDE #game so position:fixed actually anchors
       to the viewport — a position:fixed element inside a transformed parent
       (#game uses transform:scale) takes the transformed parent as its
       containing block, which would put it back inside #game's clipped zone.
       Same reason buildInventoryDOM appends to <body>. -->
  <div id="money">$0</div>
  <div id="energy">⚡100/100</div>
  <details id="menu">
    <summary>☰</summary>
    <div class="items">
      <button id="stats-relics">Stats &amp; Relics</button>
      <button id="joystick-toggle">Joystick: off</button>
      <button class="danger" id="reset-save">Reset save</button>
    </div>
  </details>
  <div id="hud"></div>
  <div id="safety">
    <div class="box">
      <p>Watch where you are going and do not enter unsafe or prohibited areas while playing!</p>
      <button id="safety-dismiss">Get my location</button>
    </div>
  </div>
  <script>
    // Fit the fixed 352×844 game box into the viewport using CSS scale.
    // Portrait: scale by WIDTH so the map fills edge-to-edge horizontally —
    // some game height tucks behind the iOS Safari URL bar, but the HUD
    // overlays (money/energy/inventory) live OUTSIDE #game and are
    // position:fixed, so they stay pinned to the visual viewport.
    // Landscape: scaling by the full 844-tall box made the game tiny on phones
    // (e.g. 844×390 → 19% width). Instead, scale so the 352×352 map area
    // fills the viewport (leaving a slice at the bottom for the inventory
    // bar), then translate the box so the MAP's centre sits at the frame's
    // centre. Game chrome above / below the map overflows and is clipped by
    // #frame, but the player only needs the map and the position:fixed HUD.
    function fitGame() {
      const W = 352, H = 844;
      const MAP = 352;             // viewSize — square map area inside #game
      const MAP_CY_IN_GAME = 362;  // viewCenterY — y of the map centre in game coords
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const portrait = vw < vh;
      const g = document.getElementById('game');
      if (!g) return;
      if (portrait) {
        const s = vw / W;
        g.style.transform = `scale(${s})`;
        g.style.left = '0px';
        g.style.top  = '0px';
      } else {
        const reservedBottom = 60;   // inventory bar sits position:fixed near the screen bottom
        const usableH = Math.max(1, vh - reservedBottom);
        const s = Math.min(vw / MAP, usableH / MAP);
        g.style.transform = `scale(${s})`;
        g.style.left = (vw / 2 - (W / 2) * s) + 'px';
        g.style.top  = (usableH / 2 - MAP_CY_IN_GAME * s) + 'px';
      }
    }
    window.addEventListener('resize', fitGame);
    window.addEventListener('orientationchange', fitGame);
    window.visualViewport?.addEventListener('resize', fitGame);
    fitGame();

    // Close menu on outside click / world tap.
    document.addEventListener('pointerdown', (e) => {
      const m = document.getElementById('menu');
      if (m && m.open && !m.contains(e.target)) m.open = false;
    }, true);
    document.getElementById('stats-relics').addEventListener('click', (e) => {
      e.stopPropagation();
      const m = document.getElementById('menu'); if (m) m.open = false;
      if (window.__scene && window.__scene.showStatsModal) window.__scene.showStatsModal();
    });
    document.getElementById('joystick-toggle').addEventListener('click', (e) => {
      e.stopPropagation();
      const m = document.getElementById('menu'); if (m) m.open = false;
      if (window.__scene && window.__scene.toggleJoystick) window.__scene.toggleJoystick();
    });
    // Safety splash dismiss → also our sensor-permission gesture. iOS
    // requires DeviceOrientationEvent.requestPermission() to be called
    // synchronously from within a user-gesture handler — so we do it
    // here, inline in the click. The promise resolution can be async; the
    // call itself just has to originate inside the click stack.
    document.getElementById('safety-dismiss').addEventListener('click', async (e) => {
      e.stopPropagation();
      const DOE = window.DeviceOrientationEvent;
      if (DOE && typeof DOE.requestPermission === 'function') {
        try {
          window.__compassPerm = await DOE.requestPermission();   // 'granted' | 'denied'
        } catch (err) {
          window.__compassPerm = 'error';
        }
      } else {
        window.__compassPerm = 'granted';  // Android / desktop: no prompt needed
      }
      document.getElementById('safety')?.remove();
      // Start sensors now if the scene already finished loading; otherwise
      // the scene's create() will see window.__compassPerm and start them.
      window.__scene?.startSensors?.();
    });
    document.getElementById('reset-save').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm('Wipe all saved progress (inventory, planted crops, opened chests)?')) return;
      // Clear every terracart save key (current + any older versions).
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('terracart.')) localStorage.removeItem(k);
      }
      location.reload();
    });

    // ───────────────────────────────────────────────────────────────
    // Mobile error surfacing — DevTools isn't reachable on phones, so
    // any uncaught JS error is flashed to #banner instead of dying silently.
    function showError(msg) {
      const b = document.getElementById('banner');
      if (!b) return;
      b.textContent = msg.length > 80 ? msg.slice(0, 77) + '…' : msg;
      b.style.display = 'block';
      clearTimeout(showError._t);
      showError._t = setTimeout(() => { b.style.display = 'none'; }, 6000);
    }
    window.addEventListener('error', (e) => {
      showError(`⚠ ${e.message || 'script error'}`);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const r = e.reason;
      showError(`⚠ ${(r && (r.message || r.toString())) || 'promise rejection'}`);
    });

    // ───────────────────────────────────────────────────────────────
    // Service worker — caches MVT tiles + the app shell so the game
    // works offline once a region has been visited, and reloads are
    // fast on cellular. Only registered when the page is served over
    // http(s) (file:// has no SW support).
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
  <script src="phaser.js"></script>
  <script src="mvt.js"></script>
  <script src="coords.js?v=111"></script>
  <script src="worldgen.js?v=129"></script>
  <script src="crops.js?v=111"></script>
  <script src="textures.js?v=129"></script>
  <script src="save.js?v=111"></script>
  <script src="items.js?v=138"></script>
  <script src="shops.js?v=3"></script>
  <script src="rarity.js?v=12"></script>
  <script src="loot.js?v=130"></script>
  <script src="interact.js?v=137"></script>
  <script src="render.js?v=135"></script>
  <script src="assets.js?v=132"></script>
  <script src="sandbox.js?v=11"></script>
  <script src="testtools.js?v=5"></script>
  <script src="app.js?v=147"></script>
</body>
</html>
