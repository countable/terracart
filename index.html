<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#111" />
  <!-- iOS PWA: launch fullscreen with a dark status bar when added to home screen. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Terracart" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>map-game prototype</title>
  <style>
    /* Phone-preview gutters — declared ONLY on :root so the JS-set values
       on document.documentElement aren't shadowed by a body-level
       declaration. (Declaring on `html, body` makes body re-declare 0px
       which then wins for every descendant, defeating the cascade.) When
       the viewport is wider than the phone column (landscape / desktop),
       fitGame sets these so all HUD overlays tuck inside the narrow phone
       column instead of stretching to the browser edges. On real phones
       (portrait) both stay 0. */
    :root {
      --phone-left:  0px;
      --phone-right: 0px;
    }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #111; color: #ddd;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      /* Block iOS Safari's elastic rubber-band overscroll on fast swipes —
         touch-action: none alone doesn't suppress it. */
      overscroll-behavior: none;
      touch-action: none;
    }
    #frame {
      position: absolute;
      top: 0; bottom: 0;
      left:  var(--phone-left, 0px);
      right: var(--phone-right, 0px);
      overflow: hidden;
    }
    /* Phone-preview vignette — a thin border that frames the simulated phone
       column on desktop so the dev can see exactly where the device edge is.
       Hidden on real portrait viewports (--phone-left = 0). */
    body.phone-preview::before {
      content: '';
      position: fixed;
      top: 0; bottom: 0;
      left:  var(--phone-left,  0px);
      right: var(--phone-right, 0px);
      border-left:  1px solid #333;
      border-right: 1px solid #333;
      box-shadow: 0 0 0 9999px #0a0a0a;
      pointer-events: none;
      z-index: 99;
    }
    /* Fixed 352×844 native size — 352 = VIEW_CELLS × CELL_PX so the 11×11
       map view fills the canvas with no side padding. We scale the whole game
       (canvas + overlays) with a CSS transform from JS so it fits any viewport
       while keeping a single coordinate system internally. */
    #game {
      width: 352px; height: 844px;
      background: #000;
      box-shadow: 0 0 24px #000a;
      position: absolute; top: 0; left: 0;
      transform-origin: top left;
    }
    #banner {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      background: #c33; color: #fff; padding: 4px 10px; border-radius: 6px;
      font-size: 12px; display: none; z-index: 10;
    }
    #hud {
      position: fixed; bottom: calc(8px + env(safe-area-inset-bottom, 0px));
      left:  calc(var(--phone-left,  0px) + 8px);
      right: calc(var(--phone-right, 0px) + 8px);
      font-size: 11px; color: #fff8; pointer-events: none; z-index: 5;
      font-family: ui-monospace, monospace;
    }
    /* Top-row HUD is position:fixed and lives outside #game (see the comment
       on #hud below) so it anchors to the visual viewport instead of #game's
       scaled box. env(safe-area-inset-top) clears the iPhone notch. */
    #money {
      position: fixed; top: calc(8px + env(safe-area-inset-top, 0px));
      right: calc(var(--phone-right, 0px) + 10px);
      background: #000a; color: #ffd96b; padding: 4px 10px;
      border: 2px solid #c8a64a; border-radius: 8px;
      font: 700 16px ui-monospace, monospace;
      pointer-events: none; z-index: 7;
    }
    #energy {
      position: fixed; top: calc(8px + env(safe-area-inset-top, 0px));
      right: calc(var(--phone-right, 0px) + 88px);
      background: #000a; color: #a7ffb0; padding: 4px 10px;
      border: 2px solid #4a8c4a; border-radius: 8px;
      font: 700 14px ui-monospace, monospace;
      pointer-events: none; z-index: 7;
    }
    #menu { position: fixed; top: calc(8px + env(safe-area-inset-top, 0px));
            left: calc(var(--phone-left, 0px) + 8px); z-index: 8; }
    #menu summary {
      list-style: none; cursor: pointer; user-select: none;
      background: #000a; color: #ddd;
      border: 2px solid #444; border-radius: 8px;
      padding: 2px 8px; font: 700 16px ui-monospace, monospace;
      line-height: 1.4;
    }
    #menu summary::-webkit-details-marker { display: none; }
    #menu[open] summary { border-color: #888; }
    #menu .items {
      margin-top: 4px; min-width: 140px;
      background: #000c; border: 2px solid #444; border-radius: 8px;
      padding: 4px; display: flex; flex-direction: column; gap: 2px;
    }
    #menu .items button {
      background: transparent; color: #ddd; border: 0;
      text-align: left; padding: 6px 8px; border-radius: 4px;
      font: 12px ui-monospace, monospace; cursor: pointer;
    }
    #menu .items button:hover { background: #fff2; }
    #menu .items button.danger { color: #ff8a7a; }
    /* Safety / sensor-permission splash shown on every load. The button
       click is the genuine user gesture we need to satisfy iOS's
       DeviceOrientationEvent.requestPermission() AND start GPS. */
    #safety {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0, 0, 0, 0.78);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    #safety .box {
      max-width: 320px; background: #1a1612; color: #fff;
      border: 2px solid #c8a64a; border-radius: 12px;
      padding: 22px 20px; text-align: center;
      font: 14px ui-monospace, monospace; line-height: 1.45;
    }
    #safety p { margin: 0 0 18px; }
    #safety button {
      background: #c8a64a; color: #1a1612; border: 0;
      padding: 12px 22px; border-radius: 8px;
      font: 700 15px ui-monospace, monospace; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="frame">
    <div id="game">
      <div id="banner">reconnecting…</div>
    </div>
  </div>
  <!-- All HUD overlays live OUTSIDE #game so position:fixed actually anchors
       to the viewport — a position:fixed element inside a transformed parent
       (#game uses transform:scale) takes the transformed parent as its
       containing block, which would put it back inside #game's clipped zone.
       Same reason buildInventoryDOM appends to <body>. -->
  <div id="money">$0</div>
  <div id="energy">⚡100/100</div>
  <details id="menu">
    <summary>☰</summary>
    <div class="items">
      <button id="stats-relics">Stats &amp; Relics</button>
      <button class="danger" id="reset-save">Reset save</button>
    </div>
  </details>
  <div id="hud"></div>
  <div id="safety">
    <div class="box">
      <h2 style="margin:0 0 12px;font:700 18px ui-monospace,monospace;color:#ffd96b;">Welcome to Pocket Acres</h2>
      <p>Watch where you are going and do not enter unsafe or prohibited areas while playing!</p>
      <button id="safety-dismiss">Get my location</button>
    </div>
  </div>
  <script>
    // Fit the fixed 352×844 game box into the viewport using CSS scale.
    //
    // Portrait (real phone): scale by WIDTH so the map fills edge-to-edge
    // horizontally. The HUD overlays (money / energy / inventory bar / menu)
    // are position:fixed and stay pinned to the visual viewport.
    //
    // Landscape (desktop preview): scale by HEIGHT so the whole 352×844 game
    // (canvas + HUD chrome) fits the browser height as a phone-shaped narrow
    // column, centred horizontally. The two gutters on either side of the
    // column are exposed as CSS variables --phone-left / --phone-right so
    // every position:fixed HUD (declared either in <style> or via inline
    // styles in app.js — joystick, inv bar, relic row, etc.) can anchor
    // itself inside the column rather than stretching across the full
    // browser width. body.phone-preview also paints a thin frame around
    // the column for clarity.
    function fitGame() {
      const W = 352, H = 844;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const portrait = vw < vh;
      const g = document.getElementById('game');
      if (!g) return;
      const root = document.documentElement;
      if (portrait) {
        const s = vw / W;
        g.style.transform = `scale(${s})`;
        g.style.left = '0px';
        g.style.top  = '0px';
        document.body.classList.remove('phone-preview');
        root.style.setProperty('--phone-left',  '0px');
        root.style.setProperty('--phone-right', '0px');
      } else {
        // Desktop emulation: pin the simulated column to phone-sized widths
        // (390..430 CSS px — iPhone regular ↔ Pro Max) so HUD overlays sized
        // for a real phone don't cramp on short laptop windows. Tall windows
        // also clamp to ≤430 so the column doesn't grow unrealistically big.
        // #frame's overflow:hidden quietly clips the bottom if the column
        // exceeds vh.
        const PHONE_MIN = 390, PHONE_MAX = 430;
        const sByHeight = vh / H;
        const sByMaxW   = PHONE_MAX / W;
        const sByMinW   = PHONE_MIN / W;
        const s = Math.max(sByMinW, Math.min(sByHeight, sByMaxW));
        const phoneW = W * s;
        const scaledH = H * s;
        const left = Math.max(0, (vw - phoneW) / 2);
        const right = Math.max(0, vw - left - phoneW);
        // Vertically centre the game inside the column. When the column is
        // shorter than the scaled game (short laptop windows + the PHONE_MIN
        // clamp above), top goes negative so the game's MIDDLE sits at the
        // viewport's middle — otherwise the player view (rendered at
        // canvas-centre ≈ 422) ends up below the visible area and the map
        // disappears off the bottom.
        const top = Math.min(0, (vh - scaledH) / 2);
        // #frame is already left/right-inset by var(--phone-*), so #game sits
        // at left:0 inside #frame — setting g.style.left = left would double
        // the offset and push the game off-centre to the right.
        g.style.transform = `scale(${s})`;
        g.style.left = '0px';
        g.style.top  = top + 'px';
        document.body.classList.add('phone-preview');
        root.style.setProperty('--phone-left',  left  + 'px');
        root.style.setProperty('--phone-right', right + 'px');
      }
    }
    window.addEventListener('resize', fitGame);
    window.addEventListener('orientationchange', fitGame);
    window.visualViewport?.addEventListener('resize', fitGame);
    fitGame();

    // Close menu on outside click / world tap.
    document.addEventListener('pointerdown', (e) => {
      const m = document.getElementById('menu');
      if (m && m.open && !m.contains(e.target)) m.open = false;
    }, true);
    document.getElementById('stats-relics').addEventListener('click', (e) => {
      e.stopPropagation();
      const m = document.getElementById('menu'); if (m) m.open = false;
      if (window.__scene && window.__scene.showStatsModal) window.__scene.showStatsModal();
    });
    // Safety splash dismiss → also our sensor-permission gesture. iOS
    // requires DeviceOrientationEvent.requestPermission() to be called
    // synchronously from within a user-gesture handler — so we do it
    // here, inline in the click. The promise resolution can be async; the
    // call itself just has to originate inside the click stack.
    document.getElementById('safety-dismiss').addEventListener('click', async (e) => {
      e.stopPropagation();
      const DOE = window.DeviceOrientationEvent;
      if (DOE && typeof DOE.requestPermission === 'function') {
        try {
          window.__compassPerm = await DOE.requestPermission();   // 'granted' | 'denied'
        } catch (err) {
          window.__compassPerm = 'error';
        }
      } else {
        window.__compassPerm = 'granted';  // Android / desktop: no prompt needed
      }
      document.getElementById('safety')?.remove();
      // Start sensors now if the scene already finished loading; otherwise
      // the scene's create() will see window.__compassPerm and start them.
      window.__scene?.startSensors?.();
    });
    // Full nuke: save data + service worker + every offline cache. We do
    // the SW / caches sweep too so a stale app shell can't survive a reset
    // — the player (and devs chasing weird behaviour) gets a truly clean
    // load. Errors are swallowed individually so a missing SW or caches
    // API never blocks the reload.
    document.getElementById('reset-save').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Wipe ALL saved progress AND offline cache (forces a fresh app download)?')) return;
      // 1) Save data — every terracart.* key (current + any older versions).
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('terracart.')) localStorage.removeItem(k);
      }
      // 2) Service worker — unregister so the next load fetches a fresh sw.js.
      try {
        const regs = (await navigator.serviceWorker?.getRegistrations?.()) || [];
        await Promise.all(regs.map(r => r.unregister().catch(() => {})));
      } catch {}
      // 3) Caches API — drop every cache bucket (app shell + MVT tiles).
      try {
        if (window.caches) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k).catch(() => {})));
        }
      } catch {}
      location.reload();
    });

    // ───────────────────────────────────────────────────────────────
    // Mobile error surfacing — DevTools isn't reachable on phones, so
    // any uncaught JS error is flashed to #banner instead of dying silently.
    function showError(msg) {
      const b = document.getElementById('banner');
      if (!b) return;
      b.textContent = msg.length > 80 ? msg.slice(0, 77) + '…' : msg;
      b.style.display = 'block';
      clearTimeout(showError._t);
      showError._t = setTimeout(() => { b.style.display = 'none'; }, 6000);
    }
    window.addEventListener('error', (e) => {
      showError(`⚠ ${e.message || 'script error'}`);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const r = e.reason;
      showError(`⚠ ${(r && (r.message || r.toString())) || 'promise rejection'}`);
    });

    // ───────────────────────────────────────────────────────────────
    // Service worker — caches MVT tiles + the app shell so the game
    // works offline once a region has been visited, and reloads are
    // fast on cellular. Only registered when the page is served over
    // http(s) (file:// has no SW support).
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
  <script src="phaser.js"></script>
  <script src="mvt.js"></script>
  <script src="coords.js?v=111"></script>
  <script src="worldgen.js?v=129"></script>
  <script src="crops.js?v=111"></script>
  <script src="textures.js?v=129"></script>
  <script src="save.js?v=111"></script>
  <script src="items.js?v=145"></script>
  <script src="shops.js?v=3"></script>
  <script src="rarity.js?v=22"></script>
  <script src="loot.js?v=131"></script>
  <script src="interact.js?v=143"></script>
  <script src="render.js?v=143"></script>
  <script src="assets.js?v=141"></script>
  <script src="sandbox.js?v=14"></script>
  <script src="testtools.js?v=5"></script>
  <script src="app.js?v=168"></script>
</body>
</html>
