<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#111" />
  <!-- iOS PWA: launch fullscreen with a dark status bar when added to home screen. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Terracart" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>map-game prototype</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #111; color: #ddd;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      /* Block iOS Safari's elastic rubber-band overscroll on fast swipes —
         touch-action: none alone doesn't suppress it. */
      overscroll-behavior: none;
      touch-action: none;
    }
    #frame {
      position: absolute; inset: 0;
      overflow: hidden;
    }
    /* Fixed 390×844 native size; we scale the whole game (canvas + overlays)
       with a CSS transform from JS so it fits any viewport while keeping a
       single coordinate system internally. Overlay positions like the money
       badge stay correct under the scale. */
    #game {
      width: 390px; height: 844px;
      background: #000;
      box-shadow: 0 0 24px #000a;
      position: absolute; top: 0; left: 0;
      transform-origin: top left;
    }
    #banner {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      background: #c33; color: #fff; padding: 4px 10px; border-radius: 6px;
      font-size: 12px; display: none; z-index: 10;
    }
    #hud {
      position: absolute; bottom: 8px; left: 8px; right: 8px;
      font-size: 11px; color: #fff8; pointer-events: none; z-index: 5;
      font-family: ui-monospace, monospace;
    }
    #money {
      position: absolute; top: 8px; right: 10px;
      background: #000a; color: #ffd96b; padding: 4px 10px;
      border: 2px solid #c8a64a; border-radius: 8px;
      font: 700 16px ui-monospace, monospace;
      pointer-events: none; z-index: 7;
    }
    #energy {
      position: absolute; top: 8px; right: 88px;
      background: #000a; color: #a7ffb0; padding: 4px 10px;
      border: 2px solid #4a8c4a; border-radius: 8px;
      font: 700 14px ui-monospace, monospace;
      pointer-events: none; z-index: 7;
    }
    #menu { position: absolute; top: 8px; left: 8px; z-index: 8; }
    #menu summary {
      list-style: none; cursor: pointer; user-select: none;
      background: #000a; color: #ddd;
      border: 2px solid #444; border-radius: 8px;
      padding: 2px 8px; font: 700 16px ui-monospace, monospace;
      line-height: 1.4;
    }
    #menu summary::-webkit-details-marker { display: none; }
    #menu[open] summary { border-color: #888; }
    #menu .items {
      margin-top: 4px; min-width: 140px;
      background: #000c; border: 2px solid #444; border-radius: 8px;
      padding: 4px; display: flex; flex-direction: column; gap: 2px;
    }
    #menu .items button {
      background: transparent; color: #ddd; border: 0;
      text-align: left; padding: 6px 8px; border-radius: 4px;
      font: 12px ui-monospace, monospace; cursor: pointer;
    }
    #menu .items button:hover { background: #fff2; }
    #menu .items button.danger { color: #ff8a7a; }
  </style>
</head>
<body>
  <div id="frame">
    <div id="game">
      <div id="banner">reconnecting…</div>
      <div id="money">$0</div>
      <div id="energy">⚡100/100</div>
      <div id="hud"></div>
      <details id="menu">
        <summary>☰</summary>
        <div class="items">
          <button id="stats-relics">Stats &amp; Relics</button>
          <button class="danger" id="reset-save">Reset save</button>
        </div>
      </details>
    </div>
  </div>
  <script>
    // Fit the fixed 390×844 game box into the viewport using CSS scale.
    // Uses visualViewport when available (iOS Safari's URL bar / dynamic toolbar).
    function fitGame() {
      const W = 390, H = 844;
      const vw = (window.visualViewport?.width)  ?? window.innerWidth;
      const vh = (window.visualViewport?.height) ?? window.innerHeight;
      const s = Math.min(vw / W, vh / H);
      const g = document.getElementById('game');
      if (!g) return;
      g.style.transform = `scale(${s})`;
      g.style.left = Math.max(0, (vw - W * s) / 2) + 'px';
      g.style.top  = Math.max(0, (vh - H * s) / 2) + 'px';
    }
    window.addEventListener('resize', fitGame);
    window.addEventListener('orientationchange', fitGame);
    window.visualViewport?.addEventListener('resize', fitGame);
    fitGame();

    // Close menu on outside click / world tap.
    document.addEventListener('pointerdown', (e) => {
      const m = document.getElementById('menu');
      if (m && m.open && !m.contains(e.target)) m.open = false;
    }, true);
    document.getElementById('stats-relics').addEventListener('click', (e) => {
      e.stopPropagation();
      const m = document.getElementById('menu'); if (m) m.open = false;
      if (window.__scene && window.__scene.showStatsModal) window.__scene.showStatsModal();
    });
    document.getElementById('reset-save').addEventListener('click', (e) => {
      e.stopPropagation();
      if (!confirm('Wipe all saved progress (inventory, planted crops, opened chests)?')) return;
      // Clear every terracart save key (current + any older versions).
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.startsWith('terracart.')) localStorage.removeItem(k);
      }
      location.reload();
    });

    // ───────────────────────────────────────────────────────────────
    // Mobile error surfacing — DevTools isn't reachable on phones, so
    // any uncaught JS error is flashed to #banner instead of dying silently.
    function showError(msg) {
      const b = document.getElementById('banner');
      if (!b) return;
      b.textContent = msg.length > 80 ? msg.slice(0, 77) + '…' : msg;
      b.style.display = 'block';
      clearTimeout(showError._t);
      showError._t = setTimeout(() => { b.style.display = 'none'; }, 6000);
    }
    window.addEventListener('error', (e) => {
      showError(`⚠ ${e.message || 'script error'}`);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const r = e.reason;
      showError(`⚠ ${(r && (r.message || r.toString())) || 'promise rejection'}`);
    });

    // ───────────────────────────────────────────────────────────────
    // Service worker — caches MVT tiles + the app shell so the game
    // works offline once a region has been visited, and reloads are
    // fast on cellular. Only registered when the page is served over
    // http(s) (file:// has no SW support).
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
  <script src="phaser.js"></script>
  <script src="mvt.js"></script>
  <script src="coords.js?v=86"></script>
  <script src="worldgen.js?v=86"></script>
  <script src="tilemap.js?v=86"></script>
  <script src="crops.js?v=86"></script>
  <script src="textures.js?v=86"></script>
  <script src="save.js?v=86"></script>
  <script src="items.js?v=86"></script>
  <script src="loot.js?v=86"></script>
  <script src="interact.js?v=86"></script>
  <script src="render.js?v=86"></script>
  <script src="assets.js?v=86"></script>
  <script src="app.js?v=86"></script>
</body>
</html>
