<!DOCTYPE html>
<html><head>
<title>POI sprite preview</title>
<style>
  body { background:#2a3a2a; color:#eee; font:14px ui-monospace,monospace; padding:20px; }
  h1 { font-size: 18px; margin: 0 0 8px; }
  .row { display:flex; flex-wrap:wrap; gap:24px; margin:18px 0; }
  .cell { text-align:center; }
  canvas { image-rendering: pixelated; background:#3a4a3a; border:1px solid #555; }
  .label { font-size:11px; margin-top:4px; color:#cdc; max-width:140px; }
  .sub { color:#9a9; font-size:10px; }
  .combo { display:flex; gap:6px; align-items:flex-end; justify-content:center; background:#3a4a3a; padding:8px; border:1px solid #555; }
  .combo canvas { background:transparent; border:none; }
</style></head>
<body>
<h1>POI sprite ideas — drawn procedurally (no asset files)</h1>
<div class="sub">All sprites are 16×16, shown at 6× scale. Same drawing style as the longgrass tuft.</div>

<h2 style="margin-top:24px;font-size:14px;">Per-category sprite</h2>
<div class="row" id="solos"></div>

<h2 style="font-size:14px;">Placement options (church example)</h2>
<div class="row" id="placements"></div>

<script>
const SIZE = 16, SCALE = 6;
function rng(seed) { let s = seed | 0; return () => { s = (s * 1664525 + 1013904223) | 0; return ((s >>> 0) % 100000) / 100000; }; }

function make(name, drawFn) {
  const c = document.createElement('canvas');
  c.width = SIZE * SCALE; c.height = SIZE * SCALE;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  // draw at SIZE then scale up
  const off = document.createElement('canvas');
  off.width = SIZE; off.height = SIZE;
  const octx = off.getContext('2d');
  drawFn(octx, SIZE, rng(name.length * 1337 + 7));
  ctx.drawImage(off, 0, 0, SIZE * SCALE, SIZE * SCALE);
  return c;
}

// ---- Sprites ----
function drawSignpost(ctx, s) {
  // wooden post + two pointing planks
  ctx.clearRect(0,0,s,s);
  ctx.fillStyle = '#6b4a2a'; ctx.fillRect(7, 4, 2, 11);     // post
  ctx.fillStyle = '#8a6a3a'; ctx.fillRect(7, 4, 1, 11);     // highlight
  // top plank (right arrow)
  ctx.fillStyle = '#a07a3a';
  ctx.fillRect(2, 5, 8, 3); ctx.fillRect(10, 6, 1, 1);
  // mid plank (left arrow)
  ctx.fillStyle = '#8a6a2a';
  ctx.fillRect(5, 9, 8, 3); ctx.fillRect(4, 10, 1, 1);
  // ground tuft
  ctx.fillStyle = '#3a5a2a'; ctx.fillRect(6, 15, 4, 1);
}

function drawChapel(ctx, s) {
  ctx.clearRect(0,0,s,s);
  // walls
  ctx.fillStyle = '#c8b89a'; ctx.fillRect(4, 8, 8, 7);
  // door
  ctx.fillStyle = '#5a3a1a'; ctx.fillRect(7, 11, 2, 4);
  // roof
  ctx.fillStyle = '#8a3a3a';
  for (let y = 0; y < 5; y++) ctx.fillRect(4 - 0 + (4-y > 0 ? -0 : 0), 8 - y, 8 + y*0, 1);
  // simpler triangular roof
  ctx.fillStyle = '#8a3a3a';
  ctx.fillRect(3, 7, 10, 1);
  ctx.fillRect(4, 6, 8, 1);
  ctx.fillRect(5, 5, 6, 1);
  ctx.fillRect(6, 4, 4, 1);
  ctx.fillRect(7, 3, 2, 1);
  // cross
  ctx.fillStyle = '#f0e4a0'; ctx.fillRect(7, 1, 2, 3); ctx.fillRect(6, 2, 4, 1);
  // ground
  ctx.fillStyle = '#3a5a2a'; ctx.fillRect(3, 15, 10, 1);
}

function drawBook(ctx, s) {
  ctx.clearRect(0,0,s,s);
  // lectern stand
  ctx.fillStyle = '#5a3a1a'; ctx.fillRect(7, 11, 2, 4); ctx.fillRect(5, 14, 6, 1);
  // open book
  ctx.fillStyle = '#dcd2b8';
  ctx.fillRect(2, 6, 6, 5); ctx.fillRect(8, 6, 6, 5);
  ctx.fillStyle = '#9a8a6a';
  ctx.fillRect(8, 6, 1, 5); ctx.fillRect(7, 6, 1, 5);  // spine
  // lines
  ctx.fillStyle = '#8a7a5a';
  ctx.fillRect(3, 7, 4, 1); ctx.fillRect(3, 9, 4, 1);
  ctx.fillRect(9, 7, 4, 1); ctx.fillRect(9, 9, 4, 1);
  ctx.fillStyle = '#3a5a2a'; ctx.fillRect(3, 15, 10, 1);
}

function drawStockpot(ctx, s) {
  ctx.clearRect(0,0,s,s);
  // fire logs
  ctx.fillStyle = '#5a3a1a'; ctx.fillRect(3, 14, 10, 2);
  // flames
  ctx.fillStyle = '#f0a040';
  ctx.fillRect(5, 12, 1, 2); ctx.fillRect(8, 11, 1, 3); ctx.fillRect(11, 12, 1, 2);
  ctx.fillStyle = '#f8d840';
  ctx.fillRect(8, 12, 1, 1); ctx.fillRect(5, 13, 1, 1);
  // pot body
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(3, 7, 10, 5);
  ctx.fillRect(4, 6, 8, 1);
  // pot highlight
  ctx.fillStyle = '#5a5a5a'; ctx.fillRect(4, 8, 1, 3);
  // handles
  ctx.fillStyle = '#2a2a2a'; ctx.fillRect(2, 8, 1, 2); ctx.fillRect(13, 8, 1, 2);
  // steam
  ctx.fillStyle = '#d8d8e8';
  ctx.fillRect(7, 4, 1, 1); ctx.fillRect(8, 2, 1, 1); ctx.fillRect(6, 3, 1, 1);
}

function drawMortar(ctx, s) {
  ctx.clearRect(0,0,s,s);
  // mortar (bowl)
  ctx.fillStyle = '#8a8a8a';
  ctx.fillRect(3, 10, 10, 5);
  ctx.fillRect(4, 9, 8, 1);
  ctx.fillStyle = '#5a5a5a'; ctx.fillRect(5, 11, 6, 2);  // hollow
  // pestle
  ctx.fillStyle = '#a08a6a';
  ctx.fillRect(10, 3, 2, 8);
  ctx.fillStyle = '#7a6a4a'; ctx.fillRect(11, 3, 1, 8);
  // herb sprig
  ctx.fillStyle = '#4a8a3a';
  ctx.fillRect(5, 9, 1, 1); ctx.fillRect(6, 8, 1, 1); ctx.fillRect(7, 9, 1, 1);
  ctx.fillStyle = '#3a5a2a'; ctx.fillRect(3, 15, 10, 1);
}

function drawWheatSheaf(ctx, s) {
  ctx.clearRect(0,0,s,s);
  // stalks
  ctx.fillStyle = '#c8a058';
  for (let i = 0; i < 5; i++) ctx.fillRect(5 + i, 8 - i*0 + i, 1, 6 - 0);
  // simpler:
  ctx.clearRect(0,0,s,s);
  ctx.fillStyle = '#c8a058';
  ctx.fillRect(4, 9, 1, 6); ctx.fillRect(6, 8, 1, 7); ctx.fillRect(8, 8, 1, 7);
  ctx.fillRect(10, 9, 1, 6); ctx.fillRect(12, 10, 1, 5);
  // heads (yellow)
  ctx.fillStyle = '#f0d860';
  ctx.fillRect(4, 7, 1, 2); ctx.fillRect(6, 6, 1, 2);
  ctx.fillRect(8, 6, 1, 2); ctx.fillRect(10, 7, 1, 2); ctx.fillRect(12, 8, 1, 2);
  // tie
  ctx.fillStyle = '#6a3a1a'; ctx.fillRect(4, 12, 9, 1);
  ctx.fillStyle = '#3a5a2a'; ctx.fillRect(3, 15, 10, 1);
}

function drawBouquet(ctx, s) {
  ctx.clearRect(0,0,s,s);
  // stems
  ctx.fillStyle = '#3a7a3a';
  ctx.fillRect(7, 9, 1, 6); ctx.fillRect(8, 9, 1, 6);
  // wrap
  ctx.fillStyle = '#cac0a0'; ctx.fillRect(5, 13, 6, 2);
  // flowers
  ctx.fillStyle = '#e04060'; ctx.fillRect(4, 6, 2, 2);
  ctx.fillStyle = '#f0c040'; ctx.fillRect(7, 4, 2, 2);
  ctx.fillStyle = '#6080e0'; ctx.fillRect(10, 6, 2, 2);
  ctx.fillStyle = '#f0a0c0'; ctx.fillRect(6, 7, 2, 2);
  ctx.fillStyle = '#a0e0a0'; ctx.fillRect(9, 8, 2, 2);
  ctx.fillStyle = '#3a5a2a'; ctx.fillRect(3, 15, 10, 1);
}

function drawMarketStall(ctx, s) {
  ctx.clearRect(0,0,s,s);
  // awning posts
  ctx.fillStyle = '#5a3a1a'; ctx.fillRect(2, 6, 1, 9); ctx.fillRect(13, 6, 1, 9);
  // awning (striped)
  for (let x = 2; x < 14; x++) {
    ctx.fillStyle = (x % 2) ? '#d04040' : '#f0e8d0';
    ctx.fillRect(x, 4, 1, 2);
  }
  // counter
  ctx.fillStyle = '#8a6a3a'; ctx.fillRect(2, 11, 12, 2);
  // wares (barrel + apples)
  ctx.fillStyle = '#6a3a1a'; ctx.fillRect(3, 8, 3, 3);
  ctx.fillStyle = '#e04040'; ctx.fillRect(8, 9, 2, 2); ctx.fillRect(11, 9, 2, 2);
  ctx.fillStyle = '#3a5a2a'; ctx.fillRect(2, 15, 12, 1);
}

function drawFlowerRing(ctx, s) {
  ctx.clearRect(0,0,s,s);
  // bench
  ctx.fillStyle = '#6a4a2a'; ctx.fillRect(5, 9, 6, 1); ctx.fillRect(5, 11, 1, 3); ctx.fillRect(10, 11, 1, 3);
  // flower spots
  const spots = [[2,12,'#e04060'],[13,12,'#f0c040'],[3,7,'#a060e0'],[12,6,'#f0a0c0'],[7,13,'#6080e0']];
  for (const [x,y,c] of spots) {
    ctx.fillStyle = c; ctx.fillRect(x, y, 2, 2);
    ctx.fillStyle = '#f8f8e0'; ctx.fillRect(x+1, y, 1, 1);
  }
  ctx.fillStyle = '#3a5a2a'; ctx.fillRect(0, 15, 16, 1);
}

const SPRITES = [
  ['Signpost',     'bus / commerce — "Gordon & Casorso"', drawSignpost],
  ['Chapel',       'place_of_worship — "Evangel Chapel"',  drawChapel],
  ['Lectern+Book', 'civic / school — "Hedge School"',      drawBook],
  ['Stockpot',     'food — restaurant / cafe',             drawStockpot],
  ['Mortar+Pestle','health — "Apothecary"',                drawMortar],
  ['Wheat Sheaf',  'farm',                                 drawWheatSheaf],
  ['Bouquet',      'flora — florist',                      drawBouquet],
  ['Market Stall', 'shop / convenience — "Circle K"',      drawMarketStall],
  ['Bench+Flowers','park — "Windermere Meadow"',           drawFlowerRing],
];

const solos = document.getElementById('solos');
for (const [name, label, fn] of SPRITES) {
  const cell = document.createElement('div'); cell.className = 'cell';
  cell.appendChild(make(name, fn));
  const lbl = document.createElement('div'); lbl.className = 'label';
  lbl.innerHTML = `<b>${name}</b><br><span class="sub">${label}</span>`;
  cell.appendChild(lbl);
  solos.appendChild(cell);
}

// ---- Placement options ----
function drawClosedChest(ctx, s) {
  ctx.clearRect(0,0,s,s);
  ctx.fillStyle = '#5a3a1a'; ctx.fillRect(3, 8, 10, 7);
  ctx.fillStyle = '#8a6a3a'; ctx.fillRect(3, 8, 10, 1); ctx.fillRect(3, 10, 10, 1);
  ctx.fillStyle = '#c0a040'; ctx.fillRect(7, 11, 2, 2);
}

function placement(label, fn) {
  const wrap = document.createElement('div'); wrap.className = 'cell';
  const box = document.createElement('div'); box.className = 'combo';
  fn(box);
  wrap.appendChild(box);
  const l = document.createElement('div'); l.className = 'label';
  l.innerHTML = label;
  wrap.appendChild(l);
  return wrap;
}

const place = document.getElementById('placements');

// A) Replace chest
place.appendChild(placement('<b>A. Replace chest</b><br><span class="sub">Cleanest. POI silhouette IS the chest. Tap-to-loot unchanged.</span>',
  box => { box.appendChild(make('chapel_a', drawChapel)); }));

// B) Alongside chest
place.appendChild(placement('<b>B. Alongside chest</b><br><span class="sub">POI icon next to chest. Reads as "place + treasure".</span>',
  box => { box.appendChild(make('chapel_b', drawChapel)); box.appendChild(make('chest_b', drawClosedChest)); }));

// C) Icon on top of chest
place.appendChild(placement('<b>C. Icon above chest</b><br><span class="sub">Smaller POI badge floats over the chest like a name label.</span>',
  box => {
    const stack = document.createElement('div');
    stack.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;';
    const small = document.createElement('canvas');
    small.width = SIZE * 3; small.height = SIZE * 3;
    const sctx = small.getContext('2d'); sctx.imageSmoothingEnabled = false;
    const off = document.createElement('canvas'); off.width = SIZE; off.height = SIZE;
    drawChapel(off.getContext('2d'), SIZE, rng(99));
    sctx.drawImage(off, 0, 0, SIZE*3, SIZE*3);
    stack.appendChild(small);
    stack.appendChild(make('chest_c', drawClosedChest));
    box.appendChild(stack);
  }));

// D) Ring of decorations around chest (park flowers)
place.appendChild(placement('<b>D. Decoration ring</b><br><span class="sub">Park-style: chest surrounded by flower-tufts / fence pieces. Most "world-y" but most pixels.</span>',
  box => {
    const ring = document.createElement('div');
    ring.style.cssText = 'position:relative;width:240px;height:120px;';
    function add(x,y,fn,key,scale=4) {
      const c = document.createElement('canvas');
      c.width = SIZE*scale; c.height = SIZE*scale;
      const cx = c.getContext('2d'); cx.imageSmoothingEnabled = false;
      const off = document.createElement('canvas'); off.width = SIZE; off.height = SIZE;
      fn(off.getContext('2d'), SIZE, rng(key));
      cx.drawImage(off, 0, 0, SIZE*scale, SIZE*scale);
      c.style.cssText = `position:absolute;left:${x}px;top:${y}px;`;
      ring.appendChild(c);
    }
    add(96, 20, drawClosedChest, 1, 5);
    add(20, 60, drawFlowerRing, 2, 3);
    add(170, 60, drawFlowerRing, 3, 3);
    add(105, 0, drawChapel, 4, 3);
    box.appendChild(ring);
  }));
</script>
</body></html>
